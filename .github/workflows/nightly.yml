name: Nightly Build

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  GO_VERSION: '1.25.8'

jobs:
  # ============================================
  # Build Nightly CLI Binaries
  # ============================================
  build-cli-nightly:
    name: Build CLI (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            suffix: linux-x64
          - os: linux
            arch: arm64
            suffix: linux-arm64
          - os: darwin
            arch: amd64
            suffix: macos-x64
          - os: darwin
            arch: arm64
            suffix: macos-arm64
          - os: windows
            arch: amd64
            suffix: windows-x64
            ext: .exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get version
        id: version
        run: |
          VERSION="nightly-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build
        working-directory: ./cmd/lionheart
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          OUTPUT="lionheart-${{ steps.version.outputs.VERSION }}-${{ matrix.suffix }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "$OUTPUT" .

      - name: Compress
        working-directory: ./cmd/lionheart
        run: |
          OUTPUT="lionheart-${{ steps.version.outputs.VERSION }}-${{ matrix.suffix }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip "${OUTPUT}.zip" "${OUTPUT}.exe"
          else
            tar -czf "${OUTPUT}.tar.gz" "$OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-cli-${{ matrix.suffix }}
          path: ./cmd/lionheart/*.tar.gz
          if-no-files-found: ignore

  # ============================================
  # Update Nightly Release
  # ============================================
  update-nightly-release:
    name: Update Nightly Release
    runs-on: ubuntu-latest
    needs: build-cli-nightly
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION="nightly-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: nightly-cli-*
          merge-multiple: true

      - name: Delete old nightly release
        uses: dev-drprasad/delete-tag-and-release@v1.0
        with:
          tag_name: nightly
          delete_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create nightly release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: Nightly Build (${{ steps.version.outputs.VERSION }})
          draft: false
          prerelease: true
          files: ./artifacts/*
          body: |
            ## Nightly Build ${{ steps.version.outputs.VERSION }}

            ⚠️ This is an automated nightly build. It may be unstable.

            ### Includes
            - Latest changes from main branch
            - CLI binaries for Linux, macOS, Windows

            ### Installation
            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for installation instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Notify on Failure
  # ============================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-cli-nightly, update-nightly-release]
    if: failure()
    steps:
      - name: Send notification
        run: |
          echo "❌ Nightly build failed!"
          echo "Repository: ${{ github.repository }}"
          echo "Run: ${{ github.run_id }}"
          # Add your notification logic here (Slack, Telegram, etc.)
