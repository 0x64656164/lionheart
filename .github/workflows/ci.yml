name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  GO_VERSION: '1.25.8'

jobs:
  # ============================================
  # Lint and Format Check
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: ./core
          args: --timeout=5m

      - name: Check formatting
        run: |
          cd core
          gofmt -d .
          test -z $(gofmt -l .)

  # ============================================
  # Build Test
  # ============================================
  build-test:
    name: Build Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [core, cli]
        include:
          - component: core
            path: ./core
          - component: cli
            path: ./cmd/lionheart
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.component }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.component }}-

      - name: Sync dependencies
        working-directory: ${{ matrix.path }}
        run: |
          cd core && go mod tidy
          cd ../cmd/lionheart && go mod tidy
          cd ../mobile/android/golib && go mod tidy

      - name: Build
        working-directory: ${{ matrix.path }}
        run: go build -v ./...

      - name: Vet
        working-directory: ${{ matrix.path }}
        run: go vet ./...

  # ============================================
  # Unit Tests
  # ============================================
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          
      - name: Sync dependencies
        working-directory: ${{ matrix.path }}
        run: |
          cd core && go mod tidy
          cd ../cmd/lionheart && go mod tidy
          cd ../mobile/android/golib && go mod tidy

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-test-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-test-

      - name: Run tests (core)
        working-directory: ./core
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./core/coverage.out
          flags: unittests
          name: codecov-umbrella

  # ============================================
  # Cross-Compilation Test
  # ============================================
  cross-compile:
    name: Cross Compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: freebsd
            goarch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          
      - name: Sync dependencies
        working-directory: ${{ matrix.path }}
        run: |
          cd core && go mod tidy
          cd ../cmd/lionheart && go mod tidy
          cd ../mobile/android/golib && go mod tidy

      - name: Cross compile CLI
        working-directory: ./cmd/lionheart
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          OUTPUT="lionheart-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="${OUTPUT}.exe"
          fi
          go build -ldflags="-s -w" -o "$OUTPUT" .
          ls -la "$OUTPUT"

  # ============================================
  # Android Build Test
  # ============================================
  android-build-test:
    name: Android Build Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Sync dependencies
        working-directory: ${{ matrix.path }}
        run: |
          cd core && go mod tidy
          cd ../cmd/lionheart && go mod tidy
          cd ../mobile/android/golib && go mod tidy

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;25.2.9519653"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Test gomobile bind
        working-directory: ./mobile/android/golib
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: |
          go mod tidy
          # Just test that it compiles, don't output AAR
          go build -v ./...

  # ============================================
  # Security Scan
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-fmt sarif -out results.sarif ./...'

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        if: always()

      - name: Run Nancy (dependency check)
        run: |
          cd core
          go list -json -deps ./... | nancy sleuth
        continue-on-error: true

  # ============================================
  # License Check
  # ============================================
  license:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check licenses
        run: |
          go install github.com/google/go-licenses@latest
          cd core
          go-licenses check ./...
        continue-on-error: true
